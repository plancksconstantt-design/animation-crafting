<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <main>
    <div class="numbers">
        <div class="digit pos-1">1</div>
        <div class="digit pos-2">0</div>
        <div class="digit pos-3">0</div>
    </div>
    <div class="min-max">
        <button class="btn-minus btns">-5</button>
        <button class="btn-plus btns">+5</button>    
    </div>
    <button class="btn-next btns">next number (+1)</button>
    <button class="btn-snow btns">snow</button>

    <div class="img">
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">Нажми</div>
                <div class="flip-card-back">
                    <img src="img_2l.png" alt="flip image">
                </div>
            </div>
        </div>
    </div>
    </main>
</body>
</html>
